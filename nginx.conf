worker_processes auto;
events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  server_tokens off;                        # hide nginx version
  client_max_body_size 10m;

  # ── Rate limiting zones ──────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=ai:10m rate=15r/m;

  # ── Logging ──────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── Gzip ────────────────────────────────────────────────────
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml;
  gzip_min_length 1000;
  gzip_comp_level 6;

  # ── Redirect HTTP → HTTPS ────────────────────────────────────
  server {
    listen 80;
    server_name sydcrestlaunchpad.com www.sydcrestlaunchpad.com;
    return 301 https://$host$request_uri;
  }

  # ── Main HTTPS server ────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name sydcrestlaunchpad.com www.sydcrestlaunchpad.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Frontend (React SPA) ─────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
      expires 1h;
      add_header Cache-Control "public, max-age=3600";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # ── API proxy ───────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=40 nodelay;
      proxy_pass         http://api:5000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 120s;
    }

    location /api/auth/ {
      limit_req zone=auth burst=3 nodelay;
      proxy_pass http://api:5000;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/api/(learning/paths/generate|learning/chat|opportunities/research|opportunities/roadmap|opportunities/assistant) {
      limit_req zone=ai burst=5 nodelay;
      proxy_pass         http://api:5000;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_read_timeout 180s;     # AI calls can take longer
    }

    # SSE (streaming) endpoints need special config
    location ~ ^/api/(learning/chat|opportunities/assistant) {
      proxy_pass         http://api:5000;
      proxy_http_version 1.1;
      proxy_set_header   Connection '';
      proxy_buffering    off;
      proxy_cache        off;
      proxy_read_timeout 180s;
    }
  }
}
